name: Notion 自动同步

on:
  schedule:
    # 每天北京时间 6:00 自动运行（UTC 22:00）
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许 git push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖（二维码检测）
        run: npm install jsqr pngjs jpeg-js

      - name: 运行 Notion 同步
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node sync-notion.js

      - name: 提取封面图
        run: node extract-covers.js

      - name: 过滤二维码
        run: node filter-qrcodes.js

      - name: 检测网盘链接失效
        run: node check-links.js

      - name: 提交推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Notion自动同步+封面图提取+二维码过滤"
          git push
